# =============================================================================
# ローカル検証用 Compose 構成 (AWS 実サービスには一切接続しない)
#
# ECS 構成との対応:
#   app-front / app-back      → 同一 Dockerfile・同一 entrypoint (完全に同じイメージ)
#   adot-collector            → 同じ ADOT Collector イメージ。exporter だけ
#                               awsxray → debug + otlphttp(Jaeger) に差し替え
#   jaeger                    → X-Ray コンソールの代替 (トレース可視化 UI)
#   mysql (8.0.42)            → Aurora MySQL Serverless v2 + RDS Proxy の代替
#   valkey                    → ElastiCache for Valkey の代替
#   svf-mock (WireMock)       → ALB 越しの SVF 帳票サーバの代替
#   ecs-metadata-mock         → ECS task metadata endpoint v4 の代替
#   cwagent                   → ローカル代替なし (メトリクス送信先の CloudWatch が
#                               ローカルに存在しないため除外。トレース検証には不要)
#
# ECS では同一タスク内 localhost 通信だが、compose では各サービスが別ネットワーク
# 名前空間のため、宛先を環境変数 (OTEL_EXPORTER_OTLP_ENDPOINT / BACK_BASE_URL 等)
# で切り替えて等価性を担保する。
# =============================================================================
name: eap-adot-local

services:
  app-front:
    build:
      context: ./docker
      dockerfile: front/Dockerfile
      args:
        EAP_BASE_IMAGE: ${EAP_BASE_IMAGE:?set in .env}
    container_name: app-front
    ports:
      - "8080:8080"
    environment:
      OTEL_SERVICE_NAME: myapp-front
      OTEL_RESOURCE_ATTRIBUTES: service.namespace=myapp,service.version=local,deployment.environment=local,aws.ecs.service.name=local-compose
      OTEL_EXPORTER_OTLP_ENDPOINT: http://adot-collector:4318
      OTEL_EXPORTER_OTLP_PROTOCOL: http/protobuf
      OTEL_TRACES_SAMPLER: parentbased_always_on   # ローカルは全量サンプリング
      ECS_CONTAINER_METADATA_URI_V4: http://ecs-metadata-mock:8080/v4/app-front
      DB_HOST: mysql
      DB_PORT: "3306"
      DB_NAME: appdb
      DB_USER: appuser
      DB_PASSWORD: ${DB_PASSWORD:?set in .env}
      VALKEY_HOST: valkey
      VALKEY_PORT: "6379"
      BACK_BASE_URL: http://app-back:8180
      TX_NODE_ID: front-local-1
    depends_on:
      adot-collector:
        condition: service_healthy
      mysql:
        condition: service_healthy
      valkey:
        condition: service_started
      app-back:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://127.0.0.1:8080/ >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 120s

  app-back:
    build:
      context: ./docker
      dockerfile: back/Dockerfile
      args:
        EAP_BASE_IMAGE: ${EAP_BASE_IMAGE:?set in .env}
    container_name: app-back
    ports:
      - "8180:8180"
    environment:
      OTEL_SERVICE_NAME: myapp-back
      OTEL_RESOURCE_ATTRIBUTES: service.namespace=myapp,service.version=local,deployment.environment=local,aws.ecs.service.name=local-compose
      OTEL_EXPORTER_OTLP_ENDPOINT: http://adot-collector:4318
      OTEL_EXPORTER_OTLP_PROTOCOL: http/protobuf
      OTEL_TRACES_SAMPLER: parentbased_always_on
      ECS_CONTAINER_METADATA_URI_V4: http://ecs-metadata-mock:8080/v4/app-back
      PORT_OFFSET: "100"
      DB_HOST: mysql
      DB_PORT: "3306"
      DB_NAME: appdb
      DB_USER: appuser
      DB_PASSWORD: ${DB_PASSWORD:?set in .env}
      VALKEY_HOST: valkey
      VALKEY_PORT: "6379"
      SVF_BASE_URL: http://svf-mock:8080
      TX_NODE_ID: back-local-1
    depends_on:
      adot-collector:
        condition: service_healthy
      mysql:
        condition: service_healthy
      valkey:
        condition: service_started
      svf-mock:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://127.0.0.1:8180/ >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 120s

  # ECS と同じ ADOT Collector イメージ。設定ファイルだけローカル用に差し替え
  adot-collector:
    image: public.ecr.aws/aws-observability/aws-otel-collector:v0.43.3
    container_name: adot-collector
    command: ["--config=/etc/otel/config.yaml"]
    environment:
      ECS_CONTAINER_METADATA_URI_V4: http://ecs-metadata-mock:8080/v4/adot-collector
    volumes:
      - ./compose/otel/adot-collector-local.yaml:/etc/otel/config.yaml:ro
    ports:
      - "4318:4318"    # OTLP http/protobuf (ホストからの疎通確認用)
    healthcheck:
      test: ["CMD", "/healthcheck"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    depends_on:
      jaeger:
        condition: service_started
      ecs-metadata-mock:
        condition: service_healthy

  # X-Ray コンソールのローカル代替 (OTLP 受信 + トレース可視化 UI)
  jaeger:
    image: jaegertracing/jaeger:2.4.0
    container_name: jaeger
    ports:
      - "16686:16686"  # UI: http://localhost:16686

  # Aurora MySQL Serverless v2 のローカル代替
  mysql:
    image: mysql:8.0.42
    container_name: mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?set in .env}
      MYSQL_DATABASE: appdb
      MYSQL_USER: appuser
      MYSQL_PASSWORD: ${DB_PASSWORD:?set in .env}
    volumes:
      - ./compose/mysql/init.sql:/docker-entrypoint-initdb.d/10-init.sql:ro
      - mysql-data:/var/lib/mysql
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ElastiCache for Valkey のローカル代替
  valkey:
    image: valkey/valkey:8.0
    container_name: valkey
    ports:
      - "6379:6379"

  # SVF 帳票サーバ (ALB 経由 REST) のローカル代替スタブ
  svf-mock:
    image: wiremock/wiremock:3.13.0
    container_name: svf-mock
    volumes:
      - ./compose/svf-mock/mappings:/home/wiremock/mappings:ro
    ports:
      - "8280:8080"

  # ECS task metadata endpoint v4 のローカル代替スタブ
  # コンテナ内では curl "${ECS_CONTAINER_METADATA_URI_V4}/task" で参照する
  ecs-metadata-mock:
    image: wiremock/wiremock:3.13.0
    container_name: ecs-metadata-mock
    volumes:
      - ./compose/ecs-metadata-mock/mappings:/home/wiremock/mappings:ro
      - ./compose/ecs-metadata-mock/__files:/home/wiremock/__files:ro
    ports:
      - "8290:8080"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8080/__admin/health"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

volumes:
  mysql-data:
